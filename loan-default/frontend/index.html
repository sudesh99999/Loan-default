<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Loan Predictor</title>
    <link rel="stylesheet" href="index.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Vanilla Tilt -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <!-- Light/Dark Mode Toggle -->
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Light/Dark Mode">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
    </button>

    <!-- History Panel Toggle -->
    <button class="history-toggle" onclick="toggleHistory()" title="View Recent Predictions">
        <i class="fa-solid fa-clock-rotate-left"></i>
    </button>

    <!-- History Sidebar -->
    <div class="history-panel" id="historyPanel">
        <div class="history-header">
            <h3>Recent Predictions</h3>
            <button onclick="toggleHistory()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="history-list" id="historyList">
            <!-- History items generated by JS -->
        </div>
        <button class="clear-history" onclick="clearHistory()">Clear History</button>
    </div>

    <!-- Main Card with 3D Tilt -->
    <div class="container" data-tilt data-tilt-max="2" data-tilt-speed="400" data-tilt-glare="true" data-tilt-max-glare="0.1">
        <h2>Loan Risk Predictor</h2>
        <p class="subtitle">Enter applicant details to analyze default probability</p>

        <div class="form-grid">
            <div class="input-group">
                <input id="mobile" type="number" placeholder=" " required>
                <label for="mobile">Mobile Usage <span class="tooltip" title="Total hours spent on the mobile app per week"><i class="fa-regular fa-circle-question"></i></span></label>
                <span class="suffix">hrs</span>
            </div>
            
            <div class="input-group">
                <input id="calls" type="number" placeholder=" " required>
                <label for="calls">Calls per Week <span class="tooltip" title="Number of support or inquiry calls made per week"><i class="fa-regular fa-circle-question"></i></span></label>
            </div>
            
            <div class="input-group">
                <input id="sms" type="number" placeholder=" " required>
                <label for="sms">SMS Sent per Week</label>
            </div>
            
            <div class="input-group">
                <input id="transactions" type="number" placeholder=" " required>
                <label for="transactions">Weekly Transactions <span class="tooltip" title="Total financial transactions in the last 7 days"><i class="fa-regular fa-circle-question"></i></span></label>
            </div>
            
            <div class="input-group has-prefix">
                <span class="prefix">$</span>
                <input id="balance" type="number" placeholder=" " required>
                <label for="balance">Current Balance</label>
            </div>
            
            <div class="input-group has-prefix">
                <span class="prefix">$</span>
                <input id="loan" type="number" placeholder=" " required>
                <label for="loan">Requested Loan Amount</label>
            </div>

            <div class="input-group slider-group">
                <label for="app">App Engagement Score: <span id="appValue" style="color: var(--primary); font-weight: bold;">50</span>/100 <span class="tooltip" title="Internal metric measuring app interaction quality"><i class="fa-regular fa-circle-question"></i></span></label>
                <input id="app" type="range" min="0" max="100" value="50" oninput="document.getElementById('appValue').innerText = this.value">
            </div>
        </div>

        <button id="predictBtn" onclick="predict()">
            <span id="btnText">Analyze Risk Profile</span>
        </button>

        <div id="result">
            <div class="gauge-container">
                <svg class="gauge" viewBox="0 0 100 50">
                    <path class="gauge-bg" d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke-width="10" stroke-linecap="round" />
                    <path class="gauge-fill" id="gaugeFill" d="M 10 50 A 40 40 0 0 1 90 50" fill="none" stroke-width="10" stroke-linecap="round" stroke-dasharray="125.6" stroke-dashoffset="125.6" />
                </svg>
                <div class="gauge-text" id="gaugeText">0%</div>
            </div>
            <div id="resultMessage"></div>
            
            <div class="explainability" id="explainabilityBox" style="display: none;">
                <h4>Key Factors:</h4>
                <ul id="reasonsList"></ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
